name: Verify the signed frontier

# On every change to the signed frontier, constellate-science/vela re-derives it
# from a clean checkout and proves the working tree IS the signed state (replay +
# signatures + hash parity). A witness-bearing frontier also re-runs every frozen
# verifier on every stored witness. It NEVER signs and NEVER merges.
on:
  push:
    branches: [main]
    paths: [".vela/**", "frontier.json", "frontier.yaml", "vela.lock", "proof/**", "witnesses/**", ".github/workflows/vela-frontier.yml"]
  pull_request:
    paths: [".vela/**", "frontier.json", "frontier.yaml", "vela.lock", "proof/**", "witnesses/**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: constellate-science/vela@main
        with:
          strict: "false"
      - name: Re-derive and prove the working tree is the signed state
        run: vela check . --strict
      - name: Reproduce every stored witness from scratch
        run: |
          if ls witnesses/*.witness.json >/dev/null 2>&1; then
            vela reproduce .
          else
            echo "no witnesses — this frontier verifies by check --strict (replay + signatures + hash parity)"
          fi
