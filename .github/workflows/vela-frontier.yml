name: Verify the signed frontier

# The git-native gate: every main push and every pull request runs the shared
# vela-check action. This is deliberately unfiltered: public canonical roots
# evolve, and a stale path allowlist would let scientific state bypass the gate.
# The action re-derives the frontier from a clean checkout and proves the
# working tree IS the signed state (replay + strict check + hash parity).
# It NEVER signs: acceptance stays a human-keyed event in the repo.
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  VELA_VERSION: v0.901.0
  VELA_LINUX_ARCHIVE_SHA256: 29ff6001374196a24fba3766462474f09fc197721cc38e353dabca01eecad2fa
  VELA_LINUX_SHA256: cf30a1dc5f575e74055396a9afde59f9b64fb82fc01e58a3e1863a5e36d6444e

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install the lock-matching Vela release
        shell: bash
        run: |
          set -euo pipefail
          lock_version="$(awk '/^vela_version:/{print $2}' vela.lock)"
          requested="${VELA_VERSION#v}"
          test -n "$lock_version"
          test "$lock_version" = "$requested"
          archive="$(mktemp)"
          extracted="$(mktemp -d)"
          trap 'rm -f "$archive"; rm -rf "$extracted"' EXIT
          curl -fsSL \
            "https://github.com/vela-science/vela/releases/download/${VELA_VERSION}/vela-linux-x86_64.tar.gz" \
            -o "$archive"
          echo "${VELA_LINUX_ARCHIVE_SHA256}  $archive" | sha256sum -c -
          tar -xzf "$archive" -C "$extracted"
          echo "${VELA_LINUX_SHA256}  $extracted/vela" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"
          install "$extracted/vela" "$HOME/.local/bin/vela"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/vela" --version
      - name: Re-derive and prove the working tree is the signed state
        run: vela check . --strict
